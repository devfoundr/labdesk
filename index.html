<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabDesk — Вход</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:#F7F6F2;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#1A1917}
.card{background:#fff;border-radius:14px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 2px 24px rgba(0,0,0,.08)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;border-radius:8px;background:#534AB7;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}
.logo-name{font-size:18px;font-weight:700;letter-spacing:-.4px}
.logo-sub{font-size:11px;color:#A8A7A3;margin-top:1px}
h1{font-size:20px;font-weight:700;margin-bottom:6px;letter-spacing:-.3px}
.sub{font-size:13px;color:#6B6A66;margin-bottom:28px}
.field{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#6B6A66;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
input{width:100%;padding:10px 14px;border:1.5px solid rgba(0,0,0,.13);border-radius:8px;font-family:inherit;font-size:14px;outline:none;transition:border-color .15s;background:#FAFAF9}
input:focus{border-color:#534AB7;background:#fff}
.btn{width:100%;padding:12px;border-radius:8px;background:#534AB7;color:#fff;font-family:inherit;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:opacity .15s;margin-top:8px}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{background:#FCEBEB;color:#A32D2D;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;display:none}
.err.show{display:block}
.loading{display:none;text-align:center;color:#6B6A66;font-size:13px;margin-top:12px}
.loading.show{display:block}
.role-badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;margin-top:4px}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div>
      <div class="logo-name">LabDesk</div>
      <div class="logo-sub">Управление лабораторией</div>
    </div>
  </div>

  <h1>Вход в систему</h1>
  <p class="sub">Введите email и пароль для входа</p>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="mail@example.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Пароль</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn" id="btn-login" onclick="doLogin()">Войти</button>
  <div class="err" id="err"></div>
  <div class="loading" id="loading">Выполняется вход...</div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAGSWCDXmTCWo4teebNMhYl_9a8AtObt9o",
  authDomain: "labdesk-e56c8.firebaseapp.com",
  projectId: "labdesk-e56c8",
  storageBucket: "labdesk-e56c8.firebasestorage.app",
  messagingSenderId: "979876487209",
  appId: "1:979876487209:web:7fd1642540d12318fafc38"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Если уже вошёл — сразу редирект
onAuthStateChanged(auth, async (user) => {
  if (user) {
    await redirectByRole(user.uid);
  }
});

async function redirectByRole(uid) {
  try {
    const snap = await getDoc(doc(db, 'users', uid));
    if (!snap.exists()) return;
    const role = snap.data().role;
    if (role === 'owner' || role === 'admin' || role === 'accountant') location.href = 'dentpro-lab.html';
    else if (role === 'clinic') location.href = 'stomat-clinic.html';
    else if (role === 'technician') location.href = 'dentpro-technician.html';
    else showErr('Роль не определена. Обратитесь к администратору.');
  } catch(e) {
    showErr('Ошибка получения профиля: ' + e.message);
  }
}

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('loading').classList.remove('show');
  document.getElementById('btn-login').disabled = false;
}

// Делаем doLogin доступной глобально
window.doLogin = async function() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const errEl = document.getElementById('err');
  const loadEl = document.getElementById('loading');

  errEl.classList.remove('show');
  if (!email || !password) { showErr('Введите email и пароль'); return; }

  btn.disabled = true;
  loadEl.classList.add('show');

  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    await redirectByRole(cred.user.uid);
  } catch(e) {
    const msgs = {
      'auth/invalid-credential': 'Неверный email или пароль',
      'auth/user-not-found': 'Пользователь не найден',
      'auth/wrong-password': 'Неверный пароль',
      'auth/too-many-requests': 'Слишком много попыток. Попробуйте позже',
      'auth/invalid-email': 'Некорректный email',
    };
    showErr(msgs[e.code] || 'Ошибка входа: ' + e.message);
  }
};

// Enter для отправки формы
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.doLogin();
});
</script>
</body>
</html>
